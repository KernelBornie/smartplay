name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Lint (api-gateway)
        working-directory: services/api-gateway
        run: npm run lint || true

      - name: Lint (web app)
        working-directory: apps/web
        run: npm run lint || true

      - name: Lint (admin app)
        working-directory: apps/admin
        run: npm run lint || true

      - name: Run tests (api-gateway)
        working-directory: services/api-gateway
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/smartplay_test
          JWT_SECRET: test-secret
          PORT: 3000
        run: npm test

      - name: Run tests (auth-service)
        working-directory: services/auth-service
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/smartplay_test
          JWT_SECRET: test-secret
        run: npm test

      - name: Build (web app)
        working-directory: apps/web
        run: npm run build

      - name: Build (admin app)
        working-directory: apps/admin
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Gateway Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.api-gateway
          push: false
          tags: smartplay/api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
